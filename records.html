<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Registos — Catequese Vigararia</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app-layout"><div class="main-content">
  <header class="page-header">
    <div>
      <div class="page-title" id="pageTitle">Os meus Registos</div>
      <div class="page-subtitle">Livros utilizados na catequese</div>
    </div>
    <div class="header-actions">
      <a href="new-record.html" class="btn btn-primary btn-sm">➕ Novo</a>
      <button class="btn btn-secondary btn-sm" onclick="exportExcel()">📥 Excel</button>
      <button class="btn btn-secondary btn-sm" onclick="window.print()">🖨</button>
    </div>
  </header>
  <main class="page-body">
    <div class="card">
      <div class="filters-bar">
        <div class="filter-group"><label>Etapa</label>
          <select class="filter-select" id="fStage" onchange="applyFilters()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Faixa etária</label>
          <select class="filter-select" id="fAge" onchange="applyFilters()"><option value="">Todas</option></select></div>
        <div class="filter-group"><label>Estado</label>
          <select class="filter-select" id="fStatus" onchange="applyFilters()">
            <option value="">Todos</option>
            <option value="draft">Rascunho</option>
            <option value="submitted">Submetido</option>
            <option value="confirmed">Confirmado</option>
          </select></div>
        <button class="btn btn-ghost btn-sm" style="margin-top:18px" onclick="clearFilters()">✕</button>
      </div>
      <div id="tbl"><div class="loading-overlay"><div class="spinner"></div></div></div>
    </div>
  </main>
</div></div>
<div id="globalModal" class="modal-overlay"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils2.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script>
Layout.render('records');
const user = Auth.getCurrentUser();
const isAdmin = Auth.isAdmin();
let allRecords=[], stages=[], ageGroups=[], parishes=[];

async function load() {
  [allRecords, stages, ageGroups, parishes] = await Promise.all([
    API.getRecords(isAdmin ? null : user.parish_id),
    API.getStages(), API.getAgeGroups(), API.getParishes(),
  ]);

  // Preenche filtros
  const fStage = document.getElementById('fStage');
  stages.forEach(s => fStage.innerHTML += `<option value="${s.id}">${s.stage_name}</option>`);
  const fAge = document.getElementById('fAge');
  ageGroups.forEach(a => fAge.innerHTML += `<option value="${a.id}">${a.age_group}</option>`);

  if (!isAdmin) {
    const p = parishes.find(p=>p.id===user.parish_id);
    if (p) document.getElementById('pageTitle').textContent = p.parish_name;
  }
  render(allRecords);
}

function applyFilters() {
  const sf = document.getElementById('fStage').value;
  const af = document.getElementById('fAge').value;
  const stf = document.getElementById('fStatus').value;
  render(allRecords.filter(r =>
    (!sf || r.stage_id===sf) && (!af || r.age_id===af) && (!stf || r.status===stf)
  ));
}
function clearFilters() {
  ['fStage','fAge','fStatus'].forEach(id => document.getElementById(id).value='');
  render(allRecords);
}

function render(records) {
  const cols = [
    ...(isAdmin ? [{ key:'parish', label:'Paróquia', render:(_,r) => r.parish?.parish_name||'—' }] : []),
    { key:'stage',     label:'Etapa',        render:(_,r) => r.stage?.stage_name||'—' },
    { key:'age',       label:'Faixa etária', render:(_,r) => r.age?.age_group||'—' },
    { key:'book_name', label:'Livro',        render:v => `<strong>${Utils.truncate(v,35)}</strong>` },
    { key:'author',    label:'Autor' },
    { key:'publisher', label:'Editora', },
    { key:'year',      label:'Ano' },
    { key:'status',    label:'Estado',  render:v => Utils.statusBadge(v) },
    { key:'created_at',label:'Data',    render:v => Utils.formatDate(v) },
  ];
  Utils.buildTable('tbl', cols, records, [
    { label:'✏', type:'edit',   fn:'editRec',   idKey:'id' },
    { label:'🗑', type:'delete', fn:'deleteRec', idKey:'id' },
  ]);
}

function editRec(id) {
  const r = allRecords.find(r=>r.id===id);
  if (!r) return;
  const stageOpts = stages.map(s=>`<option value="${s.id}" ${r.stage_id===s.id?'selected':''}>${s.stage_name}</option>`).join('');
  const ageOpts   = ageGroups.map(a=>`<option value="${a.id}" ${r.age_id===a.id?'selected':''}>${a.age_group}</option>`).join('');
  Utils.showModal('Editar Registo', `
    <div class="form-grid">
      <div class="form-group"><label>Etapa</label><select id="e_stage">${stageOpts}</select></div>
      <div class="form-group"><label>Faixa etária</label><select id="e_age">${ageOpts}</select></div>
      <div class="form-group full"><label>Livro <span class="req">*</span></label>
        <input type="text" id="e_book" value="${r.book_name||''}"></div>
      <div class="form-group"><label>Autor</label><input type="text" id="e_author" value="${r.author||''}"></div>
      <div class="form-group"><label>Editora</label><input type="text" id="e_pub" value="${r.publisher||''}"></div>
      <div class="form-group"><label>Ano</label><input type="number" id="e_year" value="${r.year||''}"></div>
      <div class="form-group full"><label>Observações</label><textarea id="e_notes">${r.notes||''}</textarea></div>
    </div>`,
    `<button class="btn btn-primary" onclick="saveRec('${id}')">💾 Guardar</button>
     <button class="btn btn-secondary" onclick="Utils.closeModal()">Cancelar</button>`);
}

async function saveRec(id) {
  const book = document.getElementById('e_book').value.trim();
  if (!book) { Toast.show('O nome do livro é obrigatório','error'); return; }
  const res = await API.updateRecord(id, {
    stage_id: document.getElementById('e_stage').value,
    age_id:   document.getElementById('e_age').value,
    book_name: book,
    author:    document.getElementById('e_author').value.trim(),
    publisher: document.getElementById('e_pub').value.trim(),
    year:      document.getElementById('e_year').value,
    notes:     document.getElementById('e_notes').value.trim(),
  });
  if (res.success) { Utils.closeModal(); Toast.show('Guardado!','success'); await load(); }
}

function deleteRec(id) {
  Utils.confirmAction('Eliminar este registo?', async () => {
    const res = await API.deleteRecord(id);
    if (res.success) { Toast.show('Eliminado!','success'); await load(); }
  });
}

function exportExcel() {
  Utils.exportToExcel(allRecords.map(r=>({
    'Paróquia':    r.parish?.parish_name||'',
    'Etapa':       r.stage?.stage_name||'',
    'Faixa etária':r.age?.age_group||'',
    'Livro':       r.book_name,
    'Autor':       r.author,
    'Editora':     r.publisher,
    'Ano':         r.year,
    'Observações': r.notes,
    'Estado':      r.status,
    'Data':        r.created_at,
  })), 'registos_catequese', 'Registos');
}

load();
</script>
</body>
</html>
