<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Paróquias — Catequese Vigararia</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="app-layout"><div class="main-content">
  <header class="page-header">
    <div><div class="page-title">Paróquias</div><div class="page-subtitle">Gestão das paróquias da vigararia</div></div>
    <div class="header-actions">
      <button class="btn btn-primary btn-sm" onclick="openCreate()">➕ Nova</button>
      <button class="btn btn-secondary btn-sm" onclick="exportExcel()">📥 Excel</button>
    </div>
  </header>
  <main class="page-body">
    <div class="kpi-grid" id="kpis" style="margin-bottom:20px;"></div>
    <div class="card"><div id="tbl"><div class="loading-overlay"><div class="spinner"></div></div></div></div>
  </main>
</div></div>
<div id="globalModal" class="modal-overlay"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js?v=3"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/layout.js"></script>
<script>
Layout.render('parishes');
Auth.requireAuth(CONFIG.ROLES.ADMIN);
let allParishes=[], allRecords=[];

async function load() {
  [allParishes, allRecords] = await Promise.all([API.getParishes(), API.getRecords()]);
  const active = allParishes.filter(p=>p.status==='active').length;
  const withRec = new Set(allRecords.map(r=>r.parish_id)).size;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi-card kpi-card-accent"><div class="kpi-icon">⛪</div><div class="kpi-value">${allParishes.length}</div><div class="kpi-label">Total</div></div>
    <div class="kpi-card kpi-card-accent accent-green"><div class="kpi-icon">✓</div><div class="kpi-value">${active}</div><div class="kpi-label">Activas</div></div>
    <div class="kpi-card kpi-card-accent accent-warn"><div class="kpi-icon">📋</div><div class="kpi-value">${withRec}</div><div class="kpi-label">Com registos</div></div>
    <div class="kpi-card kpi-card-accent"><div class="kpi-icon">⚠</div><div class="kpi-value">${allParishes.length-withRec}</div><div class="kpi-label">Sem registos</div></div>`;

  const recCount={};
  allRecords.forEach(r=>{ recCount[r.parish_id]=(recCount[r.parish_id]||0)+1; });

  Utils.buildTable('tbl', [
    { key:'parish_name',       label:'Nome',          render:v=>`<strong>${v}</strong>` },
    { key:'city',              label:'Cidade' },
    { key:'coordinator_name',  label:'Coordenador' },
    { key:'coordinator_phone', label:'Telefone' },
    { key:'status',            label:'Estado',         render:v=>Utils.statusBadge(v) },
    { key:'id',                label:'Registos',       render:v=>`<span class="badge ${(recCount[v]||0)>0?'badge-blue':'badge-gray'}">${recCount[v]||0}</span>` },
  ], allParishes, [
    { label:'✏', type:'edit',   fn:'editParish',   idKey:'id' },
    { label:'🗑', type:'delete', fn:'deleteParish', idKey:'id' },
  ]);
}

function form(p={}) {
  return `<div class="form-grid">
    <div class="form-group full"><label>Nome <span class="req">*</span></label>
      <input type="text" id="f_name" value="${p.parish_name||''}" placeholder="ex: Paróquia São José"></div>
    <div class="form-group"><label>Cidade</label><input type="text" id="f_city" value="${p.city||''}"></div>
    <div class="form-group"><label>Estado</label>
      <select id="f_status"><option value="active" ${(p.status||'active')==='active'?'selected':''}>Activa</option><option value="inactive" ${p.status==='inactive'?'selected':''}>Inactiva</option></select></div>
    <div class="form-group"><label>Coordenador</label><input type="text" id="f_coord" value="${p.coordinator_name||''}"></div>
    <div class="form-group"><label>Telefone</label><input type="text" id="f_phone" value="${p.coordinator_phone||''}"></div>
    <div class="form-group"><label>Email</label><input type="email" id="f_email" value="${p.coordinator_email||''}"></div>
  </div>`;
}

function getData() {
  return {
    parish_name:       document.getElementById('f_name').value.trim(),
    city:              document.getElementById('f_city').value.trim(),
    status:            document.getElementById('f_status').value,
    coordinator_name:  document.getElementById('f_coord').value.trim(),
    coordinator_phone: document.getElementById('f_phone').value.trim(),
    coordinator_email: document.getElementById('f_email').value.trim(),
  };
}

function openCreate() {
  Utils.showModal('Nova Paróquia', form(),
    `<button class="btn btn-primary" onclick="createParish()">➕ Criar</button>
     <button class="btn btn-secondary" onclick="Utils.closeModal()">Cancelar</button>`);
}

async function createParish() {
  const d = getData();
  if (!d.parish_name) { Toast.show('Nome obrigatório','error'); return; }
  const res = await API.createParish(d);
  if (res.success) { Utils.closeModal(); Toast.show('Paróquia criada!','success'); await load(); }
}

function editParish(id) {
  const p = allParishes.find(p=>p.id===id); if (!p) return;
  Utils.showModal('Editar Paróquia', form(p),
    `<button class="btn btn-primary" onclick="saveParish('${id}')">💾 Guardar</button>
     <button class="btn btn-secondary" onclick="Utils.closeModal()">Cancelar</button>`);
}

async function saveParish(id) {
  const d = getData();
  if (!d.parish_name) { Toast.show('Nome obrigatório','error'); return; }
  const res = await API.updateParish(id, d);
  if (res.success) { Utils.closeModal(); Toast.show('Guardado!','success'); await load(); }
}

function deleteParish(id) {
  const p = allParishes.find(p=>p.id===id);
  Utils.confirmAction(`Eliminar "${p?.parish_name}"?`, async ()=>{
    const res = await API.deleteParish(id);
    if (res.success) { Toast.show('Eliminado!','success'); await load(); }
  });
}

function exportExcel() {
  Utils.exportToExcel(allParishes.map(p=>({
    'Nome':p.parish_name,'Cidade':p.city,'Coordenador':p.coordinator_name,
    'Telefone':p.coordinator_phone,'Email':p.coordinator_email,'Estado':p.status,
  })), 'paroquias', 'Paróquias');
}

load();
</script>
</body>
</html>
